<!doctype html>
<html lang="en-US">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Delete files</title>
		<link rel="stylesheet" href="./style.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	</head>
	<body>
		<div class="page-wrapper" id="delete-content">
			<h1>Delete files</h1>
			<p>
				Here you can delete previously uploaded files.
			</p>
			<a href="/uploads">View uploaded files</a>
			<form id="filedelete">
				<label for="delfile">Type the name of the file to delete</label>
				<input type="text" id="delfile" name="delfile" required>
				<button type="submit" id="delete">Delete</button>
			</form>
		</div>
		<div class="links">
			<a href="/index.html">Back to main page</a>
		</div>
		<script>
			let filedelete = document.querySelector("#filedelete");
			filedelete.addEventListener('submit', async (e) => {
				e.preventDefault();
				let data = new FormData(filedelete);
				const fileName = data.get("delfile");
					fetch(fileName, {
						method: "DELETE"
					})
					.then(response => { return response.text(); })
					.then(html => {
						if (html !== "") {
							document.open();
							document.write(html);
							document.close();
						} else {
							const wrapper = document.querySelector("#delete-content");
							let info = document.createElement('p');
							info.textContent = "File deleted successfully!";
							wrapper.appendChild(info);
						}
					});
			});
		</script>
	</body>
</html>
